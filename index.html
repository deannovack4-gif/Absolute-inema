<section class="filters-section" id="filters">
    <div class="container">
        <div class="filters-header">
            <button id="filterToggleBtn" class="filters-toggle-btn">🎬 фильтры</button>
        </div>
        
        <!-- Модальное окно с фильтрами -->
        <div id="filterModal" class="filter-modal">
            <div class="filter-modal-content">
                <div class="filter-modal-header">
                    <h3>Фильтры</h3>
                    <button id="closeFilterModal" class="close-modal-btn">&times;</button>
                </div>
                <div class="filter-options">
                    <div class="filter-group">
                        <label>Жанр</label>
                        <select id="filterGenre">
                            <option value="all">Все жанры</option>
                            <option value="action">Боевик</option>
                            <option value="comedy">Комедия</option>
                            <option value="drama">Драма</option>
                            <option value="horror">Ужасы</option>
                            <option value="sci-fi">Фантастика</option>
                            <option value="thriller">Триллер</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Год выпуска</label>
                        <select id="filterYear">
                            <option value="all">Все годы</option>
                            <option value="1900-1979">до 1980</option>
                            <option value="1980-1990">1980-1990</option>
                            <option value="1991-2000">1991-2000</option>
                            <option value="2001-2010">2001-2010</option>
                            <option value="2011-2020">2011-2020</option>
                            <option value="2021-2025">2021-2025</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Тип</label>
                        <select id="filterType">
                            <option value="all">Все типы</option>
                            <option value="movie">Фильм</option>
                            <option value="series">Сериал</option>
                            <option value="cartoon">Мультфильм</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Длительность</label>
                        <select id="filterDuration">
                            <option value="all">Любая</option>
                            <option value="short">до 90 мин</option>
                            <option value="medium">90-120 мин</option>
                            <option value="long">более 120 мин</option>
                        </select>
                    </div>
                </div>
                <div class="filter-actions">
                    <button id="applyFiltersBtn" class="apply-filters-btn">Применить</button>
                    <button id="resetFiltersBtn" class="reset-filters-btn">Сбросить</button>
                </div>
            </div>
        </div>

        toast.textContent = message;
        
        container.appendChild(toast);
        
        // Анимация появления
        setTimeout(() => toast.classList.add('show'), 10);
        
        // Удаление тоста
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, duration);

    // --- Слайдер фильмов ---
    let currentMovieIndex = 0;
    const currentMoviePoster = document.getElementById('currentMoviePoster');
    const prevBtn = document.getElementById('prevMovieBtn');
    const nextBtn = document.getElementById('nextMovieBtn');
    const discussionFeed = document.getElementById('discussionFeed');

    // --- Хранение состояния кнопок для каждого фильма ---
    let moviesState = [];

    // Инициализация состояния для каждого фильма
    for (let i = 0; i < moviesDatabase.length; i++) {
        moviesState.push({});
    }

    // Ключ для синхронизации комментариев Бойцовского клуба с fightclub.html
    const FIGHTCLUB_COMMENTS_KEY = 'fightclubComments';
    const FIGHTCLUB_INDEX = 2; // Индекс Бойцовского клуба в moviesDatabase

    // Загрузка комментариев для Бойцовского клуба из общего хранилища
    function syncFightClubComments() {
        const savedComments = localStorage.getItem(FIGHTCLUB_COMMENTS_KEY);
        if (savedComments) {
            const parsed = JSON.parse(savedComments);
            // Сохраняем только пользовательские комментарии (не системные)
            const userComments = parsed.filter(c => c.userId !== 'system' || !moviesDatabase[FIGHTCLUB_INDEX].comments.find(mc => mc.text === c.text));
            // Добавляем к существующим, если их ещё нет
            const existingTexts = new Set(moviesDatabase[FIGHTCLUB_INDEX].comments.map(c => c.text));
            userComments.forEach(c => {
                if (!existingTexts.has(c.text)) {
                    moviesDatabase[FIGHTCLUB_INDEX].comments.push({ author: c.author, text: c.text });
                    existingTexts.add(c.text);
                }
            });
        }
    }

    // Сохранение комментариев Бойцовского клуба в общее хранилище
    function saveFightClubComments() {
        const comments = moviesDatabase[FIGHTCLUB_INDEX].comments;
        // Храним максимум 50 комментариев
        const toSave = comments.length > 50 ? comments.slice(-50) : comments;
        localStorage.setItem(FIGHTCLUB_COMMENTS_KEY, JSON.stringify(toSave.map(c => ({
            author: c.author,
            text: c.text,
            userId: c.userId || 'system',
            date: c.date || new Date().toISOString()
        }))));
    }

    // Синхронизируем при загрузке
    syncFightClubComments();

    // Функция обновления постера и комментариев
    function updateMovieAndComments(index) {
        // Если переключаемся на Бойцовский клуб, синхронизируем комментарии
        if (index === FIGHTCLUB_INDEX) {
            syncFightClubComments();
        }

        // Обновляем постер
        currentMoviePoster.src = moviesDatabase[index].poster;
        
        // Очищаем и обновляем комментарии
        discussionFeed.innerHTML = '';
        
        const comments = moviesDatabase[index].comments;
        comments.forEach(comment => {
            const commentDiv = document.createElement('div');
            commentDiv.classList.add('comment');
            
            const authorSpan = document.createElement('span');
            authorSpan.classList.add('comment-author');
            authorSpan.textContent = comment.author + ':';
            
            const textP = document.createElement('p');
            textP.classList.add('comment-text');
            textP.textContent = comment.text;
            
            commentDiv.appendChild(authorSpan);
            commentDiv.appendChild(textP);
            discussionFeed.appendChild(commentDiv);
        });
        
        // Прокручиваем комментарии вверх
        discussionFeed.scrollTop = 0;
    }

    // Обработчики кнопок слайдера
    prevBtn.addEventListener('click', () => {
        currentMovieIndex = (currentMovieIndex - 1 + moviesDatabase.length) % moviesDatabase.length;
        updateMovieAndComments(currentMovieIndex);
    });

// Функция фильтрации с полной логикой
function applyFilters() {
    const genre = document.getElementById('filterGenre').value;
    const yearRange = document.getElementById('filterYear').value;
    const type = document.getElementById('filterType').value;
    const duration = document.getElementById('filterDuration').value;
    
    const allCards = document.querySelectorAll('.filtered-movie-card');
    let visibleCount = 0;
    
    allCards.forEach(card => {
        let show = true;
        
        // Фильтр по жанру
        if (genre !== 'all') {
            let cardGenre = card.getAttribute('data-genre');
            if (!cardGenre) {
                cardGenre = card.querySelector('img')?.getAttribute('data-genre');
            }
            if (!cardGenre || cardGenre !== genre) {
                show = false;
            }
        }
        
        // Фильтр по году
        if (show && yearRange !== 'all') {
            let cardYear = parseInt(card.getAttribute('data-year'));
            if (!cardYear) {
                cardYear = parseInt(card.querySelector('img')?.getAttribute('data-year'));
            }
            let minYear, maxYear;
            if (yearRange === '1900-1979') {
                minYear = 1900;
                maxYear = 1979;
            } else {
                [minYear, maxYear] = yearRange.split('-').map(Number);
            }
            if (!cardYear || cardYear < minYear || cardYear > maxYear) {
                show = false;
            }
        }
        
        // Фильтр по типу
        if (show && type !== 'all') {
            let cardType = card.getAttribute('data-type');
            if (!cardType) {
                cardType = card.querySelector('img')?.getAttribute('data-type');
            }
            if (!cardType || cardType !== type) {
                show = false;
            }
        }
        
        // Фильтр по длительности
        if (show && duration !== 'all') {
            let cardDuration = parseInt(card.getAttribute('data-duration'));
            if (!cardDuration) {
                cardDuration = parseInt(card.querySelector('img')?.getAttribute('data-duration'));
            }
            if (!cardDuration) {
                show = false;
            } else {
                if (duration === 'short' && cardDuration >= 90) show = false;
                if (duration === 'medium' && (cardDuration < 90 || cardDuration > 120)) show = false;
                if (duration === 'long' && cardDuration <= 120) show = false;
            }
        }
        
        // Применяем видимость
        if (show) {
            card.style.display = '';
            visibleCount++;
        } else {
            card.style.display = 'none';
        }
    });
    
    // Показываем сообщение
    if (visibleCount === 0) {
        showToast('По выбранным фильтрам ничего не найдено');
    } else {
        showToast(`Найдено фильмов: ${visibleCount}`);
    }

    // Восстанавливаем оверлей (сворачиваем обратно)
    if (filteredMoviesGridEl && moviesGridOverlay) {
        filteredMoviesGridEl.classList.remove('expanded');
        moviesGridOverlay.classList.remove('hidden');
    }

    filterModal.classList.remove('show');
}

// Сброс фильтров
function resetFilters() {
    document.getElementById('filterGenre').value = 'all';
    document.getElementById('filterYear').value = 'all';
    document.getElementById('filterType').value = 'all';
    document.getElementById('filterDuration').value = 'all';

    // Показываем все карточки
    const allCards = document.querySelectorAll('.filtered-movie-card');

    });

    // Восстанавливаем оверлей
    if (filteredMoviesGridEl && moviesGridOverlay) {
        filteredMoviesGridEl.classList.remove('expanded');
        moviesGridOverlay.classList.remove('hidden');
    }

    showToast('Фильтры сброшены');
    filterModal.classList.remove('show');
}

const searchModal = document.getElementById('searchModal');

// Собираем все фильмы из каталога
function getCatalogMovies() {
    const movieCards = document.querySelectorAll('.filtered-movie-card');
    const movies = [];
    
    movieCards.forEach((card, index) => {
        const img = card.querySelector('.filtered-movie-poster');
        const titleEl = card.querySelector('.filtered-movie-title');
        const yearEl = card.querySelector('.filtered-movie-year');
        
        if (img && titleEl) {
            movies.push({
                id: index,
                title: titleEl.textContent.trim(),
                year: yearEl ? yearEl.textContent.trim() : '',
                poster: img.src,
                alt: img.alt || titleEl.textContent,
                element: card
            });
        }
    });
    
    return movies;
}

    { title: 'Бойцовский клуб', year: 1999, poster: 'images/fight-club.jpg', url: 'fightclub.html' },

];

    searchModal.classList.remove('show');

}

// Функция для рендеринга предложений

        const suggestionItem = document.createElement('div');

        suggestionItem.innerHTML = `

                <div class="suggestion-year">${movie.year}</div>

        };

                window.location.href = movie.url;
            } else if (movie.element) {

}

// Функция для выполнения поиска
function performSearch() {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) return;

    const catalogMovies = getCatalogMovies();
    
    // Ищем фильм по названию в каталоге
    const foundMovie = catalogMovies.find(movie =>
        movie.title.toLowerCase() === query ||
        movie.title.toLowerCase().includes(query)
    );

    if (foundMovie) {
        closeSearchModalFunc();
        
        // Раскрываем каталог если он свернут
        const filteredMoviesGridEl = document.getElementById('filteredMoviesGrid');
        const moviesGridOverlay = document.getElementById('moviesGridOverlay');
        if (filteredMoviesGridEl && moviesGridOverlay) {
            filteredMoviesGridEl.classList.add('expanded');
            moviesGridOverlay.classList.add('hidden');
        }
        
        // Прокручиваем к найденному фильму
        setTimeout(() => {
            foundMovie.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Подсвечиваем найденный элемент
            foundMovie.element.style.boxShadow = '0 0 20px #D6B538';
            foundMovie.element.style.transition = 'box-shadow 0.3s ease';
            setTimeout(() => {
                foundMovie.element.style.boxShadow = '';
            }, 2000);
        }, 300);
    } else {
        // Если фильм не найден в каталоге, ищем в популярных
        const foundPopular = popularMovies.find(movie =>
            movie.title.toLowerCase().includes(query)
        );
        
        if (foundPopular) {
            if (foundPopular.url === 'fightclub.html') {
                window.location.href = foundPopular.url;
            } else {
                closeSearchModalFunc();
                if (typeof showToast === 'function') {
                    showToast(`Фильм "${foundPopular.title}" будет доступен в будущем обновлении! 🎬`);
                } else {
                    alert(`Фильм "${foundPopular.title}" будет доступен в будущем обновлении!`);
                }
            }
        } else {
            renderSuggestions(popularMovies.slice(0, 5));
            if (typeof showToast === 'function') {
                showToast('Фильм не найден. Попробуйте другой запрос.');
            }
        }
    }
}

// Функция для фильтрации предложений при вводе
function filterSuggestions() {
    const query = searchInput.value.trim().toLowerCase();
    if (query === '') {
        renderSuggestions(popularMovies.slice(0, 5));
        return;
    }

    const catalogMovies = getCatalogMovies();
    
    // Ищем в каталоге
    const filteredCatalog = catalogMovies.filter(movie =>
        movie.title.toLowerCase().includes(query)
    );

    if (filteredCatalog.length > 0) {
        // Если нашли в каталоге, показываем результаты
        renderSuggestions(filteredCatalog.slice(0, 8));
    } else {
        // Иначе ищем в популярных
        const filteredPopular = popularMovies.filter(movie =>
            movie.title.toLowerCase().includes(query)
        );
        
        if (filteredPopular.length > 0) {
            renderSuggestions(filteredPopular.slice(0, 8));
        } else {
            suggestionsList.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">Ничего не найдено</div>';
        }
    }
}

// --- Обработка хешей URL для перехода из других страниц ---
function handleHashScroll() {
    const hash = window.location.hash;
    
    if (hash.startsWith('#film-')) {
        // Раскрываем каталог
        const filteredMoviesGridEl = document.getElementById('filteredMoviesGrid');
        const moviesGridOverlay = document.getElementById('moviesGridOverlay');
        if (filteredMoviesGridEl && moviesGridOverlay) {
            filteredMoviesGridEl.classList.add('expanded');
            moviesGridOverlay.classList.add('hidden');
        }
        
        // Прокручиваем к секции фильтров
        setTimeout(() => {
            document.querySelector('#filters').scrollIntoView({ behavior: 'smooth' });
        }, 300);
    } else if (hash === '#catalog' || hash === '#filters') {
        // Раскрываем каталог
        const filteredMoviesGridEl = document.getElementById('filteredMoviesGrid');
        const moviesGridOverlay = document.getElementById('moviesGridOverlay');
        if (filteredMoviesGridEl && moviesGridOverlay) {
            filteredMoviesGridEl.classList.add('expanded');
            moviesGridOverlay.classList.add('hidden');
        }
        
        // Прокручиваем к секции фильтров
        setTimeout(() => {
            document.querySelector('#filters').scrollIntoView({ behavior: 'smooth' });
        }, 300);
    }
}

// Обработаем хеш при загрузке страницы
window.addEventListener('load', () => {
    if (window.location.hash) {
        handleHashScroll();
    }
});

// Обработаем изменение хеша
